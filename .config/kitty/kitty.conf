include ./mocha.conf
font_family       JetBrains Mono Nerd Font
symbol_map        U+1F300-U+1FAFF NotoColorEmoji
font_size         14
bold_font         auto
italic_font       auto
bold_italic_font  auto
mouse_hide_wait   0
enable_audio_bell 0
# url_color         #0087bd
url_style         dotted
editor		  nvim
#Close the terminal without confirmation
confirm_os_window_close 0
background_opacity 0.98
cursor_shape block
